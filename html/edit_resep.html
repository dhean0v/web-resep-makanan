<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Edit Resep</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{
            background:#FAF3E8;
            font-family:'Lato',sans-serif;
        }

        .judul-page{
            font-family:'Playfair Display',serif;
            color:#5a2d16;
        }

        .card{
            border:none;
            border-radius:24px;
        }

        .btn-primary-custom{
            background:#C8622A;
            color:white;
        }

        .btn-primary-custom:hover{
            background:#a94f22;
            color:white;
        }

        .btn-secondary-custom{
            background:#E4D3BD;
            color:#6D4B34;
        }

    </style>

</head>

<body>


<!-- NAVBAR -->
<nav
    class="navbar navbar-expand-lg navbar-dark sticky-top"
    style="background:#7c3a1e;"
>

    <div class="container">

        <a
            class="navbar-brand fw-bold"
            href="index.html"
            style="
                color:#e8a96a;
                font-size:1.7rem;
                font-family:'Playfair Display',serif;
            "
        >
            PawonKu
        </a>

    </div>

</nav>



<!-- CONTENT -->
<div class="container py-5">


    <!-- JUDUL -->
    <div class="text-center mb-4">

        <h2 class="judul-page">

            Edit Resep

        </h2>

        <p class="text-secondary">

            Perbarui resep terbaikmu

        </p>

    </div>



    <!-- CARD -->
    <div
        class="card shadow-sm mx-auto"
        style="
            max-width:900px;
            background:#F0E0C4;
        "
    >

        <div class="card-body p-4 p-md-5">


            <!-- FOTO -->
            <div class="mb-4">

                <label class="form-label fw-semibold">

                    Foto Resep

                </label>

                <div class="mb-3">

                    <img
                        id="gambarLama"
                        class="rounded-4 shadow-sm w-100"
                        style="
                            height:240px;
                            object-fit:cover;
                        "
                    >

                </div>

                <input
                    type="file"
                    class="form-control rounded-3"
                    id="gambar"
                    accept="image/*"
                >

                <div id="previewFoto"></div>

            </div>



            <!-- JUDUL + KATEGORI -->
            <div class="row g-3 mb-4">

                <div class="col-md-8">

                    <label class="form-label fw-semibold">

                        Nama Resep

                    </label>

                    <input
                        type="text"
                        class="form-control rounded-3"
                        id="judul"
                        placeholder="Nama resep"
                    >

                </div>


                <div class="col-md-4">

                    <label class="form-label fw-semibold">

                        Kategori

                    </label>

                    <select
                        class="form-select rounded-3"
                        id="kategori"
                    >

                        <option value="">-- Pilih --</option>

                        <option value="Daging">
                            Daging
                        </option>

                        <option value="Nasi">
                            Nasi
                        </option>

                        <option value="Mie">
                            Mie
                        </option>

                        <option value="Minuman">
                            Minuman
                        </option>

                    </select>

                </div>

            </div>



            <!-- DESKRIPSI -->
            <div class="mb-4">

                <label class="form-label fw-semibold">

                    Deskripsi

                </label>

                <textarea
                    rows="4"
                    class="form-control rounded-3"
                    id="deskripsi"
                ></textarea>

            </div>



            <!-- BAHAN -->
            <div class="mb-4">

                <div
                    class="d-flex justify-content-between align-items-center mb-3"
                >

                    <label class="form-label fw-semibold mb-0">

                        Bahan-bahan

                    </label>

                    <button
                        type="button"
                        class="btn btn-dark btn-sm rounded-pill"
                        onclick="tambahBahan()"
                    >
                        + Tambah
                    </button>

                </div>


                <div id="bahanContainer">

                </div>

            </div>



            <!-- LANGKAH -->
            <div class="mb-4">

                <div
                    class="d-flex justify-content-between align-items-center mb-3"
                >

                    <label class="form-label fw-semibold mb-0">

                        Langkah Memasak

                    </label>

                    <button
                        type="button"
                        class="btn btn-dark btn-sm rounded-pill"
                        onclick="tambahLangkah()"
                    >
                        + Tambah
                    </button>

                </div>


                <div id="langkahContainer">

                </div>

            </div>



            <!-- YOUTUBE -->
            <div class="mb-4">

                <label class="form-label fw-semibold">

                    Link YouTube

                </label>

                <input
                    type="url"
                    class="form-control rounded-3"
                    id="youtube"
                    placeholder="https://youtube.com/..."
                >

            </div>



            <!-- BUTTON -->
            <div
                class="d-flex justify-content-end gap-2"
            >

                <a
                    href="author.html"
                    class="btn btn-secondary-custom rounded-pill px-4"
                >

                    Batal

                </a>

                <button
                    type="button"
                    class="btn btn-primary-custom rounded-pill px-4"
                    onclick="editResep()"
                >

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>



<!-- FOOTER -->
<footer
    class="mt-5 py-5 text-white"
    style="background:#3D2B1F;"
>

    <div class="container text-center">

        © 2026 PawonKu

    </div>

</footer>



<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/api.js"></script>

<script src="../js/edit_resep.js"></script>



<script>

document
.getElementById('gambar')
.addEventListener(

    'change',

    function () {

        const file =
        this.files[0];

        if (!file) return;

        const reader =
        new FileReader();

        reader.onload = e => {

            document
            .getElementById(
                'previewFoto'
            ).innerHTML = `

                <img
                    src="${e.target.result}"
                    class="img-fluid rounded-4 shadow-sm mt-3"
                    style="
                        max-height:220px;
                        object-fit:cover;
                    "
                >

            `;

        };

        reader.readAsDataURL(file);

    }

);


// =========================
// TAMBAH BAHAN
// =========================

function tambahBahan() {

    document.getElementById(
        'bahanContainer'
    ).innerHTML += `

        <div class="row mb-3">

            <div class="col-md-6">

                <input
                    type="text"
                    class="form-control nama-bahan"
                    placeholder="Nama bahan"
                >

            </div>

            <div class="col-md-6">

                <input
                    type="text"
                    class="form-control jumlah-bahan"
                    placeholder="Jumlah"
                >

            </div>

        </div>

    `;

}


// =========================
// TAMBAH LANGKAH
// =========================

function tambahLangkah() {

    document.getElementById(
        'langkahContainer'
    ).innerHTML += `

        <div class="mb-3">

            <textarea
                class="form-control langkah-input"
                rows="3"
                placeholder="Langkah memasak"
            ></textarea>

        </div>

    `;

}

</script>

</body>
</html>
