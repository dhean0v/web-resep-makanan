<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Detail Resep</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{
            background:#FAF3E8;
            font-family:'Lato',sans-serif;
        }

        .card{
            border:none;
            border-radius:24px;
        }

        .section-title{
            font-family:'Playfair Display',serif;
            color:#7c3a1e;
            font-weight:700;
        }

        ul li,
        ol li{
            margin-bottom:10px;
            line-height:1.8;
        }

        #judulResep{
            font-family:'Playfair Display',serif;
            color:#5a2d16;
            font-size:2.4rem;
        }

        .custom-card{
            background:#f0e0c4;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav
        class="navbar navbar-expand-lg navbar-dark sticky-top"
        style="background:#7c3a1e;"
    >

        <div class="container">

            <a
                class="navbar-brand fw-bold"
                href="index.html"
                style="
                    color:#e8a96a;
                    font-size:1.7rem;
                    font-family:'Playfair Display',serif;
                "
            >
                PawonKu
            </a>

        </div>

    </nav>


    <!-- CONTENT -->
    <div
        class="container py-4"
        style="max-width:950px;"
    >

        <!-- HEADER -->
        <div class="mb-4 text-center">

            <span
                id="kategoriResep"
                class="badge rounded-pill text-white px-3 py-2 mb-3"
                style="background:#C8622A;"
            ></span>

            <h2 id="judulResep"></h2>

            <p class="text-secondary">

                Oleh:
                <span
                    id="authorResep"
                    class="fw-bold"
                ></span>

            </p>

        </div>


        <!-- FOTO -->
        <div class="text-center mb-4">

            <img
                id="fotoResep"
                src=""
                class="img-fluid rounded-4 shadow-sm"
                style="
                    width:100%;
                    max-width:750px;
                    height:320px;
                    object-fit:cover;
                "
            >

        </div>


        <!-- DESKRIPSI -->
        <div class="card shadow-sm mb-4">

            <div
                class="card-body p-4 custom-card"
            >

                <h4 class="section-title mb-3">
                    Deskripsi
                </h4>

                <p
                    id="deskripsiResep"
                    class="mb-0"
                ></p>

            </div>

        </div>


        <!-- VIDEO -->
        <div
            id="youtubeContainer"
            class="mb-4"
        ></div>


        <!-- BAHAN -->
        <div class="card shadow-sm mb-4">

            <div
                class="card-body p-4 custom-card"
            >

                <h4 class="section-title mb-3">
                    Bahan-bahan
                </h4>

                <ul id="bahanResep"></ul>

            </div>

        </div>


        <!-- LANGKAH -->
        <div class="card shadow-sm mb-4">

            <div
                class="card-body p-4 custom-card"
            >

                <h4 class="section-title mb-3">
                    Langkah Memasak
                </h4>

                <ol id="langkahResep"></ol>

            </div>

        </div>


        <!-- BUTTON -->
        <div class="text-center mt-4">

            <a
                href="resep.html"
                class="btn text-white rounded-pill px-4 py-2 shadow-sm"
                style="background:#B5521E;"
            >
                ← Kembali
            </a>

        </div>

    </div>


    <!-- SCRIPT -->
    <script src="../js/api.js"></script>

    <script src="../js/detail.js"></script>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    ></script>

</body>
</html>
