<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register - PawonKu</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet"
    >

</head>

<body style="background:#FAF3E8;">


    <!-- NAVBAR -->
    <nav
        class="navbar navbar-expand-lg navbar-dark sticky-top"
        style="background:#7c3a1e;"
    >

        <div class="container">

            <a
                class="navbar-brand fw-bold"
                href="index.html"
                style="
                    color:#e8a96a;
                    font-size:1.7rem;
                    font-family:'Playfair Display',serif;
                "
            >
                PawonKu
            </a>

        </div>

    </nav>



    <!-- CONTAINER -->
    <div class="container py-5">

        <div
            class="card border-0 shadow rounded-4 overflow-hidden"
        >

            <div class="row g-0">


                <!-- KIRI -->
                <div
                    class="col-md-6 position-relative"
                    style="
                        min-height:650px;
                    "
                >

                    <img
                        src="https://images.unsplash.com/photo-1716816211590-c15a328a5ff0?fm=jpg&q=60&w=3000&auto=format&fit=crop"
                        class="w-100 h-100"
                        style="object-fit:cover;"
                    >

                    <div
                        class="position-absolute bottom-0 start-0 w-100 p-4"
                    >

                        <h1
                            class="text-white fw-bold mb-3"
                            style="
                                font-family:'Playfair Display',serif;
                            "
                        >

                            Inspirasi Masakan
                            di Setiap Hari

                        </h1>

                        <p class="text-white">

                            Temukan dan bagikan resep
                            terbaikmu bersama PawonKu.

                        </p>

                    </div>

                </div>



                <!-- KANAN -->
                <div
                    class="col-md-6 d-flex align-items-center justify-content-center p-4"
                >

                    <div
                        class="w-100"
                        style="max-width:400px;"
                    >

                        <h3
                            class="fw-bold text-center mb-4"
                        >

                            Register

                        </h3>


                        <!-- FORM -->
                        <form id="formRegister">


                            <!-- NAMA -->
                            <div class="mb-3">

                                <label class="form-label">

                                    Nama

                                </label>

                                <input
                                    type="text"
                                    class="form-control rounded-3"
                                    id="nama"
                                    placeholder="Nama lengkap"
                                    required
                                >

                            </div>



                            <!-- EMAIL -->
                            <div class="mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                    type="email"
                                    class="form-control rounded-3"
                                    id="email"
                                    placeholder="email@gmail.com"
                                    required
                                >

                            </div>



                            <!-- PASSWORD -->
                            <div class="mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <input
                                    type="password"
                                    class="form-control rounded-3"
                                    id="password"
                                    placeholder="Password"
                                    required
                                >

                            </div>



                            <!-- KONFIRMASI -->
                            <div class="mb-4">

                                <label class="form-label">

                                    Konfirmasi Password

                                </label>

                                <input
                                    type="password"
                                    class="form-control rounded-3"
                                    id="konfirmasi"
                                    placeholder="Ulangi password"
                                    required
                                >

                            </div>



                            <!-- BUTTON -->
                            <button
                                type="submit"
                                class="btn w-100 text-white rounded-3 mb-3"
                                style="background:#B5521E;"
                            >

                                Daftar

                            </button>


                            <p
                                class="text-center text-secondary mb-0"
                            >

                                Sudah punya akun?

                                <a
                                    href="login.html"
                                    class="fw-bold"
                                    style="color:#C8622A;"
                                >

                                    Login

                                </a>

                            </p>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>



    <!-- FOOTER -->
    <footer
        class="mt-5 py-5 text-white"
        style="background:#3D2B1F;"
    >

        <div class="container text-center">

            © 2026 PawonKu

        </div>

    </footer>



    <!-- SCRIPT -->
    <script src="../js/api.js"></script>

    <script src="../js/register.js"></script>

</body>
</html>
