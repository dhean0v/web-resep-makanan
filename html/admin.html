<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Admin Panel - PawonKu
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet"
    >

</head>

<body
    style="
        background:#FAF3E8;
        font-family:'Lato',sans-serif;
    "
>


<!-- =========================
NAVBAR
========================= -->

<nav
    class="navbar navbar-expand-lg navbar-dark shadow-sm"
    style="background:#7c3a1e;"
>

    <div class="container">

        <a
            class="navbar-brand fw-bold"
            href="#"
            style="
                color:#e8a96a;
                font-size:1.7rem;
                font-family:'Playfair Display',serif;
            "
        >

            PawonKu Admin

        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navAdmin"
        >

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
            class="collapse navbar-collapse"
            id="navAdmin"
        >

            <div class="d-flex align-items-center ms-auto gap-3">

                    <ul class="navbar-nav">

                        <li class="nav-item">

                            <a
                                href="#"
                                class="nav-link active"
                            >
                                Dashboard
                            </a>

                        </li>

                        <li class="nav-item">

                            <a
                                href="#"
                                class="nav-link"
                            >
                                Kelola Resep
                            </a>

                        </li>

                    </ul>

                    <!-- LOGOUT -->
                    <button
                        class="btn btn-sm btn-danger rounded-pill px-3"
                        onclick="logoutAdmin()"
                    >

                        Logout

                    </button>

            </div>

    </div>

</nav>



<!-- =========================
CONTENT
========================= -->

<div class="container py-5">


    <!-- HEADER -->
    <div
        class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4"
    >

        <div>

            <h2
                class="fw-bold"
                style="
                    font-family:'Playfair Display',serif;
                "
            >

                Kelola Resep

            </h2>

            <p class="text-secondary mb-0">

                Approve atau hapus resep dari user

            </p>

        </div>


        <!-- SEARCH -->
        <input
            type="search"
            class="form-control rounded-pill"
            placeholder="Cari resep..."
            style="
                max-width:250px;
            "
        >

    </div>



    <!-- CARD TABLE -->
    <div
        class="card border-0 shadow-sm rounded-4 overflow-hidden"
    >

        <div class="card-body p-0">


            <!-- TABLE -->
            <div class="table-responsive">

                <table
                    class="table align-middle mb-0"
                >

                    <thead
                        style="
                            background:#F0E0C4;
                        "
                    >

                        <tr>

                            <th class="px-4 py-3">
                                Foto
                            </th>

                            <th>
                                Nama Resep
                            </th>

                            <th>
                                Kategori
                            </th>

                            <th>
                                Status
                            </th>

                            <th class="text-center">
                                Aksi
                            </th>

                        </tr>

                    </thead>


                    <!-- AUTO JS -->
                    <tbody id="listResep">

                        <tr>

                            <td
                                colspan="5"
                                class="text-center py-5 text-secondary"
                            >

                                Memuat data resep...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>



<!-- =========================
FOOTER
========================= -->

<footer
    class="mt-5 py-4 text-center text-white"
    style="background:#3D2B1F;"
>

    © 2026 PawonKu Admin Panel

</footer>



<!-- =========================
SCRIPT
========================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/api.js"></script>

<script src="../js/admin.js"></script>

<script src="../js/logout_admin.js"></script>

</body>

</html>
