<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Detail Resep Saya</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body style="background:#FAF3E8;">

    <!-- NAVBAR -->
    <nav
        class="navbar navbar-expand-lg navbar-dark sticky-top"
        style="background:#7c3a1e;"
    >

        <div class="container">

            <a
                class="navbar-brand fw-bold"
                href="index.html"
                style="
                    color:#e8a96a;
                    font-size:1.7rem;
                "
            >
                PawonKu
            </a>

        </div>

    </nav>


    <!-- CONTENT -->
    <div class="container py-5">

        <!-- HEADER -->
        <div
            class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4"
        >

            <div>

                <span
                    id="kategoriResep"
                    class="badge rounded-pill text-white mb-2"
                    style="background:#C8622A;"
                ></span>

                <h2
                    id="judulResep"
                    style="
                        font-family:'Playfair Display';
                    "
                ></h2>

                <p class="text-secondary">

                    Oleh:
                    <span
                        id="authorResep"
                        class="fw-bold"
                    ></span>

                </p>

            </div>


            <!-- BUTTON -->
            <div class="d-flex gap-2">

                <a
                    id="btnEdit"
                    href="#"
                    class="btn rounded-pill px-3"
                    style="
                        background:#FFF0E6;
                        color:#B5521E;
                    "
                >
                    ✎ Edit
                </a>

                <button
                    id="btnHapus"
                    class="btn btn-danger rounded-pill px-3"
                >
                    🗑 Hapus
                </button>

            </div>

        </div>


        <!-- FOTO -->
        <div class="text-center mb-4">

            <img
                id="fotoResep"
                src=""
                class="img-fluid rounded-4 shadow"
                style="
                    width:100%;
                    max-width:900px;
                    height:350px;
                    object-fit:cover;
                "
            >

        </div>


        <!-- DESKRIPSI -->
        <div
            class="card border-0 shadow-sm rounded-4 mb-4"
        >

            <div
                class="card-body p-4"
                style="background:#f0e0c4;"
            >

                <h4 class="mb-3">
                    Deskripsi
                </h4>

                <p
                    id="deskripsiResep"
                    class="mb-0"
                ></p>

            </div>

        </div>

        <!-- VIDEO YOUTUBE -->
        <div
            id="youtubeContainer"
            class="mb-4"
        ></div>


        <!-- BAHAN -->
        <div
            class="card border-0 shadow-sm rounded-4 mb-4"
        >

            <div
                class="card-body p-4"
                style="background:#f0e0c4;"
            >

                <h4 class="mb-3">
                    Bahan-bahan
                </h4>

                <ul id="bahanResep"></ul>

            </div>

        </div>


        <!-- LANGKAH -->
        <div
            class="card border-0 shadow-sm rounded-4 mb-4"
        >

            <div
                class="card-body p-4"
                style="background:#f0e0c4;"
            >

                <h4 class="mb-3">
                    Langkah Memasak
                </h4>

                <ol id="langkahResep"></ol>

            </div>

        </div>


        <!-- BUTTON -->
        <div class="text-center">

            <a
                href="author.html"
                class="btn text-white rounded-pill px-4"
                style="background:#B5521E;"
            >
                ← Kembali
            </a>

        </div>

    </div>


    <!-- SCRIPT -->
    <script src="../js/api.js"></script>

    <script src="../js/detail_saya.js"></script>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    ></script>

</body>
</html>
