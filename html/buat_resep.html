<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Tambah Resep</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>

        body{
            background:#FAF3E8;
            font-family:'Lato',sans-serif;
        }

        .judul-page{
            font-family:'Playfair Display',serif;
            color:#5a2d16;
        }

        .card{
            border:none;
            border-radius:24px;
        }

        .section-title{
            color:#7c3a1e;
            font-weight:700;
        }

        .btn-tambah{
            background:#C8622A;
            color:white;
        }

        .btn-tambah:hover{
            background:#a94d1f;
            color:white;
        }

        .btn-batal{
            background:#E4D3BD;
            color:#6D4B34;
        }

    </style>

</head>

<body>


    <!-- NAVBAR -->
    <nav
        class="navbar navbar-expand-lg navbar-dark sticky-top"
        style="background:#7c3a1e;"
    >

        <div class="container">

            <a
                class="navbar-brand fw-bold"
                href="index.html"
                style="
                    color:#e8a96a;
                    font-size:1.7rem;
                    font-family:'Playfair Display',serif;
                "
            >
                PawonKu
            </a>

        </div>

    </nav>



    <!-- CONTENT -->
    <div class="container py-5">


        <!-- JUDUL -->
        <div class="mb-4 text-center">

            <h2 class="judul-page">

                Tambah Resep

            </h2>

            <p class="text-secondary">

                Bagikan resep terbaikmu dan inspirasi orang lain.

            </p>

        </div>



        <!-- FORM -->
        <form id="formBuatResep">

            <div
                class="card shadow-sm mx-auto"
                style="
                    max-width:900px;
                    background:#F0E0C4;
                "
            >

                <div class="card-body p-4 p-md-5">


                    <!-- FOTO -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Foto Resep

                        </label>

                        <input
                            type="file"
                            class="form-control rounded-3"
                            id="foto"
                            name="foto"
                            accept="image/*"
                        >

                        <div
                            id="previewFoto"
                            class="mt-3"
                        ></div>

                    </div>



                    <!-- JUDUL + KATEGORI -->
                    <div class="row g-3 mb-4">

                        <div class="col-md-8">

                            <label class="form-label fw-semibold">

                                Nama Resep

                            </label>

                            <input
                                type="text"
                                class="form-control rounded-3"
                                id="judul"
                                name="judul"
                                placeholder="Contoh: Rendang Daging"
                                required
                            >

                        </div>


                        <div class="col-md-4">

                            <label class="form-label fw-semibold">

                                Kategori

                            </label>

                            <select
                                class="form-select rounded-3"
                                id="kategori"
                                name="kategori"
                                required
                            >

                                <option value="">

                                    -- Pilih --

                                </option>

                                <option value="Daging">

                                    Daging

                                </option>

                                <option value="Nasi">

                                    Nasi

                                </option>

                                <option value="Mie">

                                    Mie

                                </option>

                                <option value="Minuman">

                                    Minuman

                                </option>

                            </select>

                        </div>

                    </div>



                    <!-- DESKRIPSI -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Deskripsi

                        </label>

                        <textarea
                            rows="4"
                            class="form-control rounded-3"
                            id="deskripsi"
                            name="deskripsi"
                            placeholder="Deskripsi resep..."
                            required
                        ></textarea>

                    </div>



                    <!-- BAHAN -->
                    <div class="mb-4">

                        <div
                            class="d-flex justify-content-between align-items-center mb-3"
                        >

                            <label class="form-label fw-semibold mb-0">

                                Bahan-bahan

                            </label>

                            <button
                                type="button"
                                class="btn btn-sm btn-dark rounded-pill"
                                onclick="tambahBahan()"
                            >
                                + Tambah
                            </button>

                        </div>


                        <div id="bahanContainer">

                            <div class="row mb-3">

                                <div class="col-md-6">

                                    <input
                                        type="text"
                                        class="form-control nama-bahan"
                                        placeholder="Nama bahan"
                                    >

                                </div>

                                <div class="col-md-6">

                                    <input
                                        type="text"
                                        class="form-control jumlah-bahan"
                                        placeholder="Jumlah"
                                    >

                                </div>

                            </div>

                        </div>

                    </div>



                    <!-- LANGKAH -->
                    <div class="mb-4">

                        <div
                            class="d-flex justify-content-between align-items-center mb-3"
                        >

                            <label class="form-label fw-semibold mb-0">

                                Langkah Memasak

                            </label>

                            <button
                                type="button"
                                class="btn btn-sm btn-dark rounded-pill"
                                onclick="tambahLangkah()"
                            >
                                + Tambah
                            </button>

                        </div>


                        <div id="langkahContainer">

                            <div class="mb-3">

                                <textarea
                                    class="form-control langkah-input"
                                    rows="3"
                                    placeholder="Langkah memasak"
                                ></textarea>

                            </div>

                        </div>

                    </div>



                    <!-- YOUTUBE -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Link YouTube

                            <span class="text-muted fw-normal">

                                (opsional)

                            </span>

                        </label>

                        <input
                            type="url"
                            class="form-control rounded-3"
                            id="youtube_url"
                            name="youtube_url"
                            placeholder="https://youtube.com/..."
                        >

                    </div>



                    <!-- BUTTON -->
                    <div
                        class="d-flex justify-content-end gap-2"
                    >

                        <a
                            href="author.html"
                            class="btn btn-batal rounded-pill px-4"
                        >

                            Batal

                        </a>

                        <button
                            type="submit"
                            class="btn btn-tambah rounded-pill px-4"
                        >

                            Tambah Resep

                        </button>

                    </div>

                </div>

            </div>

        </form>

    </div>



    <!-- FOOTER -->
    <footer
        class="mt-5 py-5 text-white"
        style="background:#3D2B1F;"
    >

        <div class="container text-center">

            © 2026 PawonKu.
            All rights reserved.

        </div>

    </footer>



    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/api.js"></script>

    <script src="../js/buat_resep.js"></script>



    <!-- PREVIEW FOTO -->
    <script>

        document
        .getElementById('foto')

        .addEventListener(

            'change',

            function () {

                const file =
                this.files[0];

                if (!file) return;

                const reader =
                new FileReader();

                reader.onload = e => {

                    document.getElementById(
                        'previewFoto'
                    ).innerHTML =

                    `
                        <img
                            src="${e.target.result}"
                            class="img-fluid rounded-4 shadow-sm"
                            style="
                                max-height:220px;
                                object-fit:cover;
                            "
                        >
                    `;

                };

                reader.readAsDataURL(file);

            }

        );


        // =========================
        // TAMBAH BAHAN
        // =========================

        function tambahBahan() {

            document.getElementById(
                'bahanContainer'
            ).innerHTML += `

                <div class="row mb-3">

                    <div class="col-md-6">

                        <input
                            type="text"
                            class="form-control nama-bahan"
                            placeholder="Nama bahan"
                        >

                    </div>

                    <div class="col-md-6">

                        <input
                            type="text"
                            class="form-control jumlah-bahan"
                            placeholder="Jumlah"
                        >

                    </div>

                </div>

            `;

        }


        // =========================
        // TAMBAH LANGKAH
        // =========================

        function tambahLangkah() {

            document.getElementById(
                'langkahContainer'
            ).innerHTML += `

                <div class="mb-3">

                    <textarea
                        class="form-control langkah-input"
                        rows="3"
                        placeholder="Langkah memasak"
                    ></textarea>

                </div>

            `;

        }

    </script>

</body>
</html>
