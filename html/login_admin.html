<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        Login Admin
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body
    style="
        background:#FAF3E8;
    "
>

<div
    class="container d-flex justify-content-center align-items-center"
    style="min-height:100vh;"
>

    <div
        class="card border-0 shadow rounded-4 p-4"
        style="
            width:100%;
            max-width:420px;
        "
    >

        <h2 class="text-center mb-4">

            Admin Login

        </h2>


        <form id="formLoginAdmin">

            <!-- USERNAME -->
            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="username"
                    required
                >

            </div>


            <!-- PASSWORD -->
            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                >

            </div>


            <!-- BUTTON -->
            <button
                type="submit"
                class="btn w-100 text-white"
                style="background:#C8622A;"
            >

                Login

            </button>

        </form>

    </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/login_admin.js"></script>

</body>
</html>
